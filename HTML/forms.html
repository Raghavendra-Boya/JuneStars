<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <!--
    WHat is form:
    form is used to collect user input and senf to the server

    syntax:
    <form>
        from elements
    </form>
    <fieldset><fieldset>
    -->

    <form action="#" method="post" autocomplete="off">
       <fieldset>
        <legend>Text based input elements</legend>
         <!-- <label for="name">Name:</label><br><br> -->
        <input type="hidden" placeholder="Enter Your Name" name="UserName" required minlength="3" maxlength="15" autofocus value="Raghavendra" readonly disabled>
        <!-- <input type="text" name="" id="name"> -->
         <!--
            type="email"
            validates the email formte automatically

        
         -->
            <input type="email" placeholder="Enter Email" name="email"  autocomplete="off">
            <input type="password" placeholder="Password" name="password" >
            <select name="" id="">
                <option value="+91">+91</option>
                <option value="+1">+1</option>

            </select>
            <input type="tel" pattern="[0-9]{10}">

<input type="url">
<input type="search">
       </fieldset>


       <fieldset>
        <legend>Number & date elements</legend>
        <input type="number" step="2" min="18" max="100">
        <input type="date" min="2020-01-01" max="2026-01-01">
        <input type="time">
        <input type="datetime-local">
        <input type="month">
        <input type="week">
       </fieldset>

       <fieldset>
        <legend>Selection Input ELemnts</legend>
        <label for="">Gender:</label>
        <input type="radio" id="male" name="gender" value="male" checked>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <label for="">Skills:</label>
        <input type="checkbox" name="skills" value="html" id="html">
        <label for="html">HTML</label>
         <input type="checkbox" name="skills" value="css" id="css">
        <label for="css">CSS</label>
         <input type="checkbox" name="skills" value="js" id="js">
        <label for="js">JS</label>

        <select name="course" multiple>
            <option value="" >---Select---</option>
            <option value="java" >JAVA</option>
            <option value="FS">Full STack</option>
            <option value="py">Python</option>

        </select>

        <input type="file" accept=".pdf,.docx" multiple>
        <input type="color">
        <input type="range" name="" id="" step="2" min="0" max="6">
        <progress></progress>
        <textarea name="" id="" rows="5" cols="10"></textarea>
        <label for="browser">Choose Browser</label>
        <input list="browsers" id="browser">
        <datalist id="browsers">
            <option value="Chrome">
            <option value="Edge">

            <option value="Firefox">
            <option value="Safari">


        </datalist>
       </fieldset>
        <button>submit</button>
        <input type="submit">
        <input type="reset">
        <input type="button" value="Reset">
    </form>
</body>
</html>
