    HTMl Structure Explanation:
    1. <!DOCTYPE html>----declare theat the document is HTML5 document to the browser
    2. <html lang="en">---root element of a webpage
    3. <head>----conyains information about the webpage
    4. meta----
    5. title---define the title of the webpage
    6. body----contyains the all visible content
    
    
    HTML4                           HTML5
    1. doctype is lengthy           short
    2. no local storage                local storage availble
    3. no multimedia supoort(plug ins) build in multimedia
    4. non semantic tags                semantic tags
    5. don't have canvas support        support
    6. limited form input fields        new iput types

    whats is HTML:
    hyper text markup language

    hypertext---text contains links to other pages or resources
    <a href="destination URL">Link</a>

    markup language:
    using tags to mark and organoze content

    <h1>Heading-1</h1>



    core components of HTML:
    1. tags
        tag is keyword which is enclosed b/w the angle brackets(<>) used to define the HTML Elemnts
        syntax:
        <tagname>
            types:
            1. paired tag/container tags
                <tagname>content</tagname>
                html,body,title,p,h1 to h6,a
            2.Empty/ self closing tags:
            <tagname>
                img,br,meta,doctype,input

    2. elements

    which contains opening tag and content and closing tag 

    Openingtag + content + closing tag

    <tagname>content</tagname>
    <p>Lorem</p>

    types of elements:
    1. inline elemnt
    take only required width

    eg:a,img,span,input,button
    2. block level elemnt
    3. void elemnt
    3. attributes
    attribute provide the additional info about element

    attributename="attributevalue"

    inside the opening tag

    1. global attribute
    can be used on almost every HTML element
    style,title,id,class
    2. element specific attributes
    works only with specific elemnts
    href,src,alt,target


    
    -->
